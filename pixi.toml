[project]
name = "mimic4ed-fairness-audit"
version = "0.1.0"
description = "Fairness, explainability, and clinical validity audit for MIMIC-IV-ED benchmark models"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.9"
numpy = ">=1.23"
pandas = ">=1.4"
scikit-learn = ">=1.1"
matplotlib = ">=3.5"
seaborn = ">=0.12"
shap = ">=0.42"
fairlearn = ">=0.9"
scipy = ">=1.9"
tabulate = ">=0.9"
pip = "*"

[tasks]
audit = "python -m audit.run_audit"
audit-synthetic = "python -m audit.run_audit --synthetic"
audit-fast = "python -m audit.run_audit --synthetic --skip-shap --skip-variants"
test = "python -m audit.tests.test_pipeline"
generate-synthetic = "python -m audit.tests.test_with_synthetic"
